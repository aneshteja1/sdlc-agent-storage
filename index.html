<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>SDLC AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
[data-theme="dark"]{--bg:#0d1117;--surface:#161c2b;--s2:#1e2740;--s3:#263050;--border:#2d3a55;--accent:#4f91f5;--green:#34d878;--red:#f85149;--yellow:#f5a623;--text:#c9d8f0;--text2:#7a90b5;--muted:#4a5a78;--shadow:0 8px 40px rgba(0,0,0,.7);--nav:#111827;--code-bg:#0d1117;--overlay:rgba(0,0,0,.6);}
[data-theme="light"]{--bg:#f7f5f0;--surface:#fff;--s2:#f0ece4;--s3:#e8e2d8;--border:#d6d0c4;--accent:#2563eb;--green:#16a34a;--red:#dc2626;--yellow:#d97706;--text:#1a2236;--text2:#4a5a78;--muted:#8a9ab8;--shadow:0 4px 24px rgba(0,0,0,.1);--nav:#fff;--code-bg:#f6f8fa;--overlay:rgba(0,0,0,.4);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;height:100%;height:100dvh;overflow:hidden;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

#status-bar{padding:6px 16px;font-size:11px;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:center;gap:10px;flex-shrink:0;}
#status-bar.hidden{display:none;}
#status-bar.waking{background:rgba(245,166,35,.1);border-bottom:1px solid var(--yellow);color:var(--yellow);}
#status-bar.error{background:rgba(248,81,73,.1);border-bottom:1px solid var(--red);color:var(--red);}
#status-bar.ok{background:rgba(52,216,120,.1);border-bottom:1px solid var(--green);color:var(--green);}
.retry-btn{padding:2px 10px;border:1px solid currentColor;border-radius:4px;background:none;color:inherit;cursor:pointer;font-size:10px;font-family:inherit;white-space:nowrap;}

#toast{display:none;position:fixed;z-index:9999;bottom:calc(76px + env(safe-area-inset-bottom));right:16px;border-radius:10px;padding:12px 18px;font-size:12px;font-weight:600;color:#fff;box-shadow:var(--shadow);max-width:calc(100vw - 32px);}
#toast.show{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:54px;background:var(--nav);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;}
.nav-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 10px rgba(248,81,73,.5);flex-shrink:0;transition:.3s;}
.logo-name{font-size:18px;font-weight:700;white-space:nowrap;}
.logo-name em{color:var(--accent);font-style:normal;font-weight:300;}
#conn-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;}
.nav-r{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.hamburger{display:none;flex-direction:column;gap:5px;width:38px;height:38px;align-items:center;justify-content:center;background:var(--s2);border:1px solid var(--border);border-radius:9px;cursor:pointer;flex-shrink:0;}
.hamburger span{width:16px;height:2px;background:var(--text);border-radius:2px;}
.btn-nav{padding:6px 12px;border-radius:9px;background:var(--s2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;}
.btn-primary{padding:6px 12px;border-radius:9px;background:var(--accent);border:none;color:#fff;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;}

.layout{display:grid;grid-template-columns:280px 1fr;flex:1;overflow:hidden;min-height:0;}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .28s cubic-bezier(.4,0,.2,1);}
.sidebar-body{flex:1;overflow-y:auto;}
.new-session-btn{margin:10px;padding:12px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;cursor:pointer;width:calc(100% - 20px);}
.sidebar-close-btn{display:none;position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:8px;background:var(--s2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:16px;align-items:center;justify-content:center;z-index:1;}
.sidebar-overlay{display:none;position:fixed;inset:0;z-index:199;background:var(--overlay);}
.sidebar-overlay.on{display:block;}

.acc-section{border-top:1px solid var(--border);}
.acc-hdr{display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);user-select:none;}
.acc-hdr:hover{color:var(--text);background:var(--s2);}
.acc-body{display:none;padding:6px 16px 16px;}
.acc-hdr.open+.acc-body{display:block;}

/* ── USAGE CARDS ── */
.limit-alert{background:rgba(248,81,73,.1);border:1px solid var(--red);border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:11px;color:var(--red);font-weight:600;display:none;}
.limit-alert.show{display:block;}
.su-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;transition:border-color .3s;}
.su-card.warn{border-color:var(--yellow);}
.su-card.danger{border-color:var(--red);}
.su-card.ok{border-color:var(--green);}
.su-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.su-name{font-size:12px;font-weight:700;}
.su-badge{font-size:9px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:4px;background:var(--s3);color:var(--muted);}
.su-card.warn .su-badge{background:rgba(245,166,35,.2);color:var(--yellow);}
.su-card.danger .su-badge{background:rgba(248,81,73,.2);color:var(--red);}
.su-card.ok .su-badge{background:rgba(52,216,120,.2);color:var(--green);}
.su-bars{display:flex;flex-direction:column;gap:4px;margin-bottom:6px;}
.su-bar-row{display:flex;align-items:center;gap:6px;}
.su-bar-label{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;width:22px;flex-shrink:0;}
.su-track{flex:1;height:4px;background:var(--s3);border-radius:3px;overflow:hidden;}
.su-fill{height:100%;border-radius:3px;background:var(--green);transition:width .4s,background .3s;}
.su-fill.warn{background:var(--yellow);}
.su-fill.danger,.su-fill.full{background:var(--red);animation:pulse .8s infinite alternate;}
@keyframes pulse{from{opacity:.6}to{opacity:1}}
.su-pct{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;width:28px;text-align:right;}
.su-detail{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;display:flex;justify-content:space-between;flex-wrap:wrap;gap:2px;}

.h-item{padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:.15s;}
.h-item:hover,.h-item.active{background:var(--s2);}
.h-q{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.h-meta{font-size:10px;color:var(--muted);margin-top:3px;font-family:'JetBrains Mono',monospace;}

.chat{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.messages{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth;min-height:0;}
.msg{display:flex;gap:10px;animation:msgIn .25s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;flex-direction:row-reverse;max-width:80%;}
.msg.agent{align-self:flex-start;width:100%;}
.avatar{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.avatar.agent{background:var(--accent);}
.avatar.user{background:var(--s3);border:1px solid var(--border);}
.bubble-wrap{display:flex;flex-direction:column;gap:6px;width:100%;min-width:0;}
.bubble{padding:12px 16px;font-size:14px;line-height:1.7;border-radius:6px 16px 16px 16px;word-break:break-word;}
.msg.user .bubble{background:var(--accent);color:#fff;border-radius:16px 6px 16px 16px;}
.msg.agent .bubble{background:var(--surface);border:1px solid var(--border);width:100%;}
.step-container{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.step-card{display:flex;align-items:flex-start;gap:9px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;}
.step-card.active{border-color:var(--accent);background:var(--s3);}
.step-card.done{border-color:var(--green);opacity:.8;}
.step-card.error{border-color:var(--red);}
.step-card.heal{border-color:var(--yellow);}
.step-num{width:22px;height:22px;border-radius:6px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;font-family:'JetBrains Mono',monospace;flex-shrink:0;margin-top:1px;}
.step-card.done .step-num{background:var(--green);}
.step-card.error .step-num{background:var(--red);}
.step-card.heal .step-num{background:var(--yellow);}
.step-title{font-size:12px;font-weight:700;color:var(--text);}
.step-msg{font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-top:2px;word-break:break-all;}
.code-block{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px;}
.code-hdr{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:var(--s2);border-bottom:1px solid var(--border);font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent);}
.copy-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:3px 10px;border-radius:4px;cursor:pointer;font-size:10px;min-height:26px;}
.code-body{padding:12px;font-family:'JetBrains Mono',monospace;font-size:12px;overflow-x:auto;max-height:320px;}
.code-body pre,.code-body code{background:none!important;font-family:inherit;font-size:inherit;}
.answer-text{padding-top:10px;border-top:1px solid var(--border);margin-top:10px;}
.answer-text:empty{display:none;border:none;margin:0;padding:0;}
.md-content h1,.md-content h2,.md-content h3{margin:14px 0 6px;color:var(--text);}
.md-content p{margin-bottom:10px;}
.md-content code{background:var(--s2);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);word-break:break-all;}

.input-area{padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
.input-box{display:flex;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:10px 14px;align-items:flex-end;}
.input-box:focus-within{border-color:var(--accent);}
#user-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:max(16px,14px);resize:none;max-height:120px;line-height:1.5;}
#user-input::placeholder{color:var(--muted);}
.send-btn{width:42px;height:42px;min-width:44px;min-height:44px;border-radius:10px;background:var(--accent);border:none;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;}
.send-btn:hover:not(:disabled){opacity:.85;}
.send-btn:disabled{opacity:.35;cursor:not-allowed;}
.input-hint{font-size:10px;color:var(--muted);text-align:center;margin-top:7px;font-family:'JetBrains Mono',monospace;}
.welcome{margin:auto;text-align:center;max-width:480px;padding:24px;opacity:.7;}
.welcome .wi{font-size:44px;margin-bottom:14px;}
.welcome h1{font-size:26px;margin-bottom:10px;}
.welcome p{font-size:14px;color:var(--text2);line-height:1.7;}

@media(max-width:1023px){
  .layout{grid-template-columns:1fr;}
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:min(300px,85vw);z-index:200;transform:translateX(-100%);box-shadow:4px 0 30px rgba(0,0,0,.5);padding-top:env(safe-area-inset-top);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-close-btn{display:flex;}
  .hamburger{display:flex;}
}
@media(max-width:599px){
  .nav{height:50px;padding:0 12px;}.logo-name{font-size:16px;}#conn-label{display:none;}
  .messages{padding:14px 10px;gap:12px;}.bubble{padding:10px 13px;font-size:13px;}.msg.user{max-width:92%;}
  #status-bar{font-size:10px;padding:5px 10px;flex-wrap:wrap;gap:4px;}
  .input-area{padding:10px 10px;padding-bottom:calc(10px + env(safe-area-inset-bottom));}.input-hint{display:none;}
  .code-body{font-size:11px;max-height:200px;}.welcome .wi{font-size:38px;}.welcome h1{font-size:22px;}
  #toast{bottom:calc(68px + env(safe-area-inset-bottom));right:10px;}
}
@media(min-width:1024px){
  .layout{grid-template-columns:280px 1fr;}.hamburger{display:none;}.sidebar-close-btn{display:none!important;}
  .messages{padding:28px 24px;}.input-area{padding:16px 24px;padding-bottom:calc(16px + env(safe-area-inset-bottom));}.msg.user{max-width:72%;}
}
@media(min-width:1440px){.layout{grid-template-columns:300px 1fr;}}
</style>
</head>
<body>

<div id="status-bar" class="waking"><span id="status-msg">⚡ Waking backend…</span><button class="retry-btn" onclick="startConnection()">↺ Retry</button></div>
<div id="toast"></div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<nav class="nav">
  <div class="nav-left">
    <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
    <div class="logo-dot" id="conn-dot"></div>
    <div class="logo-name">SDLC <em>Agent</em></div>
    <span id="conn-label">connecting…</span>
  </div>
  <div class="nav-r">
    <button class="btn-nav" onclick="toggleTheme()">🌓</button>
    <button class="btn-primary" onclick="newSession()">＋ New Chat</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar" style="position:relative">
    <button class="sidebar-close-btn" onclick="closeSidebar()">✕</button>
    <button class="new-session-btn" onclick="newSession()">＋ New Session</button>
    <div class="sidebar-body">

      <div class="acc-section">
        <div class="acc-hdr open" onclick="toggleAcc(this)">💬 Chat History ▾</div>
        <div class="acc-body" id="history-list" style="padding:0">
          <div style="padding:16px;color:var(--muted);font-size:11px;text-align:center">No history yet</div>
        </div>
      </div>

      <div class="acc-section">
        <div class="acc-hdr open" onclick="toggleAcc(this)">📊 API Usage ▾</div>
        <div class="acc-body">
          <div class="limit-alert" id="limit-alert">⚠️ <span id="limit-msg"></span></div>
          <div id="usage-cards"></div>
        </div>
      </div>

    </div>
  </aside>

  <section class="chat">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="wi">🤖</div>
        <h1>How can I help you build?</h1>
        <p>Generate full-stack code, execute backend scripts,<br>and search the web for docs — autonomously.</p>
      </div>
    </div>
    <div class="input-area">
      <div class="input-box">
        <textarea id="user-input" rows="1" placeholder="Describe your architecture…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMsg()" disabled>➤</button>
      </div>
      <div class="input-hint">Agentic 6-Step Loop • Auto-heal • GitHub sync</div>
    </div>
  </section>
</div>

<script>
const HTTP='https://mrbody-sdlc-agent-backend.hf.space';
const WSS='wss://mrbody-sdlc-agent-backend.hf.space';

// Provider limits for frontend display
const PROVIDERS={
  groq:      {label:'Groq',       color:'#4f91f5',req_day:14400, tok_day:0,       req_min:30, tok_min:6000 },
  cerebras:  {label:'Cerebras',   color:'#a855f7',req_day:0,     tok_day:1000000, req_min:30, tok_min:0    },
  gemini:    {label:'Gemini',     color:'#34d878',req_day:1500,  tok_day:0,       req_min:15, tok_min:32000},
  openrouter:{label:'OpenRouter', color:'#f5a623',req_day:200,   tok_day:0,       req_min:0,  tok_min:0    },
  mistral:   {label:'Mistral',    color:'#f85149',req_day:500,   tok_day:0,       req_min:5,  tok_min:0    },
  github:    {label:'GitHub',     color:'#8b949e',req_day:5000,  tok_day:0,       req_min:0,  tok_min:0    },
};

let ws=null,wsReady=false,retries=0,retryTimer=null;
let busy=false,turnId=null,turnText='';
let chatLog=[],sessionId=uid();
let history=JSON.parse(localStorage.getItem('sdlc_hist')||'[]');

window.addEventListener('load',()=>{renderHistory();buildUsageCards();startConnection();});
function uid(){return Math.random().toString(36).slice(2,10);}

/* ── USAGE CARDS ── */
function buildUsageCards(){
  document.getElementById('usage-cards').innerHTML=Object.entries(PROVIDERS).map(([id,p])=>`
    <div class="su-card" id="card-${id}">
      <div class="su-top">
        <span class="su-name" style="color:${p.color}">${p.label}</span>
        <span class="su-badge" id="badge-${id}">OK</span>
      </div>
      <div class="su-bars" id="bars-${id}"><div class="su-bar-row"><span style="font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace">No data yet</span></div></div>
      <div class="su-detail"><span id="det-${id}">—</span><span id="rst-${id}"></span></div>
    </div>`).join('');
}

function updateUsage(snap){
  let warnMsg='';
  Object.entries(snap).forEach(([id,d])=>{
    const cfg=PROVIDERS[id];if(!cfg)return;
    const card=document.getElementById(`card-${id}`);
    const badge=document.getElementById(`badge-${id}`);
    const barsEl=document.getElementById(`bars-${id}`);
    const det=document.getElementById(`det-${id}`);
    const rst=document.getElementById(`rst-${id}`);
    if(!card)return;

    const bars=[];
    if(d.req_limit_day>0){const p=pct(d.requests,d.req_limit_day);bars.push(bar('D',p,d.requests,d.req_limit_day,'req'));}
    if(d.tok_limit_day>0){const p=pct(d.tokens,d.tok_limit_day);bars.push(bar('T',p,d.tokens,d.tok_limit_day,'tok'));}
    if(d.req_limit_min>0){const p=pct(d.minute_requests||0,d.req_limit_min);bars.push(bar('M',p,d.minute_requests||0,d.req_limit_min,'req/m'));}
    if(d.tok_limit_min>0){const p=pct(d.minute_tokens||0,d.tok_limit_min);bars.push(bar('MT',p,d.minute_tokens||0,d.tok_limit_min,'tok/m'));}
    if(!bars.length)bars.push(`<div class="su-bar-row"><span style="font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace">No limits set</span></div>`);
    barsEl.innerHTML=bars.join('');

    const maxP=Math.max(
      d.req_limit_day>0?d.requests/d.req_limit_day*100:0,
      d.tok_limit_day>0?d.tokens/d.tok_limit_day*100:0
    );
    card.className='su-card';
    if(maxP>=100){card.classList.add('danger');badge.textContent='MAXED';if(!warnMsg)warnMsg=`${cfg.label} limit reached — auto-fallback active`;}
    else if(maxP>=80){card.classList.add('warn');badge.textContent=Math.round(maxP)+'%';if(!warnMsg)warnMsg=`${cfg.label} at ${Math.round(maxP)}% — approaching limit`;}
    else if(maxP>0){card.classList.add('ok');badge.textContent=Math.round(maxP)+'%';}
    else{badge.textContent='OK';}

    const parts=[];
    if(d.req_limit_day>0)parts.push(`${d.requests}/${d.req_limit_day} req`);
    if(d.tok_limit_day>0)parts.push(`${fmt(d.tokens)}/${fmt(d.tok_limit_day)} tok`);
    det.textContent=parts.join(' • ')||`${d.requests||0} calls`;

    if(d.reset_at){
      const m=Math.max(0,Math.round((d.reset_at-Date.now()/1000)/60));
      rst.textContent=m>0?`resets in ${m}m`:'resets soon';
    }
  });

  const alertEl=document.getElementById('limit-alert');
  if(warnMsg){alertEl.classList.add('show');document.getElementById('limit-msg').textContent=warnMsg;}
  else{alertEl.classList.remove('show');}
}

function pct(used,limit){return Math.min(Math.round(used/limit*100),100);}
function bar(lbl,p,used,limit,unit){
  const cls=p>=100?'full':p>=80?'warn':p>=50?'danger':'';
  return `<div class="su-bar-row"><span class="su-bar-label">${lbl}</span><div class="su-track"><div class="su-fill ${cls}" style="width:${p}%"></div></div><span class="su-pct">${p}%</span></div>`;
}
function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':String(n);}

/* ── SIDEBAR ── */
function toggleSidebar(){document.getElementById('sidebar').classList.contains('open')?closeSidebar():openSidebar();}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebar-overlay').classList.add('on');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('on');}

/* ── CONNECTION ── */
async function startConnection(){
  clearTimeout(retryTimer);
  setBar('waking','⚡ Pinging backend…');setDot('yellow');setLabel('waking…');
  // Fetch usage on load
  try{const r=await fetch(`${HTTP}/usage`,{signal:AbortSignal.timeout(8000)});if(r.ok){const d=await r.json();updateUsage(d.usage);}}catch(_){}
  try{const r=await fetch(`${HTTP}/ping`,{signal:AbortSignal.timeout(30000)});if(!r.ok)throw new Error('HTTP '+r.status);setBar('waking','✅ Backend awake — testing WebSocket…');}
  catch(e){setBar('waking','⏳ Backend starting — attempting WebSocket…');}
  const ok=await wsTest();
  if(!ok){scheduleRetry('WebSocket handshake failed');return;}
  openMainWS();
}

function wsTest(){
  return new Promise(resolve=>{
    let done=false;const finish=v=>{if(!done){done=true;resolve(v);}};
    try{
      const t=new WebSocket(`${WSS}/ws-test`);
      t.onmessage=()=>{t.close();finish(true);};
      t.onerror=()=>finish(false);
      t.onclose=e=>{if(e.code!==1000)finish(false);};
      setTimeout(()=>finish(false),8000);
    }catch(e){finish(false);}
  });
}

function openMainWS(){
  if(ws){try{ws.close();}catch(_){}ws=null;}
  wsReady=false;setSendDisabled(true);
  try{ws=new WebSocket(`${WSS}/ws/${sessionId}`);}catch(e){scheduleRetry(e.message);return;}
  ws.onopen=()=>{wsReady=true;retries=0;setSendDisabled(false);setBar('ok','✅ Connected to SDLC Agent');setTimeout(()=>setBar('hidden'),3000);setDot('green');setLabel('connected');};
  ws.onclose=e=>{wsReady=false;setSendDisabled(true);setDot('red');if(busy)finalizeTurn('⚠️ Connection dropped. Please resend.');scheduleRetry(`code ${e.code}${e.reason?': '+e.reason:''}`);};
  ws.onerror=()=>{};
  ws.onmessage=e=>{try{dispatch(JSON.parse(e.data));}catch(_){}};
}

function scheduleRetry(reason){
  const delay=Math.min(3000*Math.pow(1.8,retries),30000);retries++;
  const s=Math.round(delay/1000);setLabel(`retry in ${s}s`);
  setBar('error',`🔌 ${reason} — retrying in ${s}s (attempt ${retries})`);
  retryTimer=setTimeout(startConnection,delay);
}

/* ── INPUT ── */
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey&&window.innerWidth>600){e.preventDefault();sendMsg();}}

function sendMsg(){
  const inp=document.getElementById('user-input');const txt=inp.value.trim();
  if(!txt)return;
  if(!wsReady){toast('⏳ Still connecting…','warn');return;}
  if(busy){toast('⏳ Still processing…','warn');return;}
  document.getElementById('welcome')?.remove();
  addBubble('user',txt);chatLog.push({role:'user',content:txt});
  inp.value='';inp.style.height='auto';
  busy=true;setSendDisabled(true);
  document.getElementById('send-btn').textContent='⏳';
  turnId='turn-'+Date.now();turnText='';
  ws.send(JSON.stringify({content:txt,session_id:sessionId}));
  saveHistory();
  if(window.innerWidth<1024)closeSidebar();
}

function dispatch(msg){
  if(msg.type==='usage'&&msg.usage){updateUsage(msg.usage);return;}
  switch(msg.type){
    case 'thinking':    ensureBubble();break;
    case 'step':        addStep(msg.step,msg.title,msg.message,msg.state);break;
    case 'code_ready':  addCode(msg.file,msg.code);break;
    case 'answer_part': appendMd(msg.content);break;
    case 'complete':    finalizeTurn(msg.message);break;
    case 'error':       toast('❌ '+msg.message,'error');finalizeTurn();break;
  }
}

/* ── UI ── */
function addBubble(role,text){
  const m=document.getElementById('messages');const d=document.createElement('div');d.className=`msg ${role}`;
  d.innerHTML=`<div class="avatar ${role}">${role==='agent'?'🤖':'👤'}</div><div class="bubble-wrap"><div class="bubble">${esc(text)}</div></div>`;
  m.appendChild(d);scrollDown();
}
function ensureBubble(){
  let el=document.getElementById(turnId);
  if(!el){const m=document.getElementById('messages');el=document.createElement('div');el.className='msg agent';el.id=turnId;
    el.innerHTML=`<div class="avatar agent">🤖</div><div class="bubble-wrap"><div class="bubble md-content"><div class="step-container"></div><div class="answer-text"></div></div></div>`;
    m.appendChild(el);scrollDown();}
  return el;
}
function addStep(num,title,message,state){
  const bubble=ensureBubble();const sc=bubble.querySelector('.step-container');const id=`s-${turnId}-${num}`;
  let card=document.getElementById(id);if(!card){card=document.createElement('div');card.id=id;sc.appendChild(card);}
  card.className=`step-card ${state}`;
  card.innerHTML=`<div class="step-num">${num}</div><div><div class="step-title">${esc(title)}</div><div class="step-msg">${esc(message)}</div></div>`;
  scrollDown();
}
function addCode(filename,code){
  const bubble=ensureBubble();const sc=bubble.querySelector('.step-container');const blk=document.createElement('div');blk.className='code-block';
  let hi=esc(code);try{hi=hljs.highlightAuto(code).value;}catch(_){}
  blk.innerHTML=`<div class="code-hdr"><span>📄 ${esc(filename)}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><div class="code-body"><pre><code>${hi}</code></pre></div>`;
  sc.appendChild(blk);scrollDown();
}
function copyCode(btn){navigator.clipboard.writeText(btn.closest('.code-block').querySelector('code').innerText).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500);});}
function appendMd(text){const bubble=ensureBubble();const ans=bubble.querySelector('.answer-text');turnText+=text;ans.innerHTML=renderMd(turnText);scrollDown();}
function finalizeTurn(finalText){
  busy=false;document.getElementById('send-btn').textContent='➤';setSendDisabled(!wsReady);
  if(finalText)appendMd('\n\n'+finalText);chatLog.push({role:'agent',content:turnText});saveHistory();turnId=null;
}

/* ── SESSION ── */
function newSession(){
  sessionId=uid();chatLog=[];turnId=null;
  document.getElementById('messages').innerHTML=`<div class="welcome" id="welcome"><div class="wi">🤖</div><h1>How can I help you build?</h1><p>Generate full-stack code, execute backend scripts,<br>and search the web for docs — autonomously.</p></div>`;
  closeSidebar();startConnection();renderHistory();
}
function saveHistory(){
  localStorage.setItem(`sdlc_s_${sessionId}`,JSON.stringify(chatLog));
  history=history.filter(h=>h.id!==sessionId);
  history.unshift({id:sessionId,title:(chatLog[0]?.content||'New Chat').slice(0,32)+'…',time:new Date().toLocaleTimeString()});
  if(history.length>30)history.length=30;localStorage.setItem('sdlc_hist',JSON.stringify(history));renderHistory();
}
function loadSession(id){
  const saved=JSON.parse(localStorage.getItem(`sdlc_s_${id}`)||'null');if(!saved)return;
  sessionId=id;chatLog=saved;turnId=null;document.getElementById('messages').innerHTML='';
  chatLog.forEach(m=>{if(m.role==='user')addBubble('user',m.content);else{turnId='turn-'+uid();turnText='';appendMd(m.content);turnId=null;}});
  closeSidebar();startConnection();renderHistory();
}
function renderHistory(){
  const list=document.getElementById('history-list');
  if(!history.length){list.innerHTML='<div style="padding:16px;color:var(--muted);font-size:11px;text-align:center">No history yet</div>';return;}
  list.innerHTML=history.map(h=>`<div class="h-item ${h.id===sessionId?'active':''}" onclick="loadSession('${h.id}')"><div class="h-q">${esc(h.title)}</div><div class="h-meta">${h.time}</div></div>`).join('');
}

/* ── HELPERS ── */
const $=id=>document.getElementById(id);
const scrollDown=()=>{const m=$('messages');m.scrollTop=m.scrollHeight;};
const setSendDisabled=v=>{$('send-btn').disabled=v;};
function setBar(state,msg){const b=$('status-bar');if(state==='hidden'){b.className='hidden';return;}b.className=state;if(msg)$('status-msg').textContent=msg;}
function setDot(c){const m={green:['var(--green)','rgba(52,216,120,.5)'],red:['var(--red)','rgba(248,81,73,.5)'],yellow:['var(--yellow)','rgba(245,166,35,.5)']};const[bg,sh]=m[c]||m.red;$('conn-dot').style.cssText=`background:${bg};box-shadow:0 0 10px ${sh}`;}
function setLabel(t){$('conn-label').textContent=t;}
function toggleTheme(){const d=document.documentElement;d.setAttribute('data-theme',d.getAttribute('data-theme')==='dark'?'light':'dark');}
function toggleAcc(h){h.classList.toggle('open');}
function toast(msg,type='info'){const t=$('toast');t.textContent=msg;t.style.background=type==='error'?'var(--red)':type==='warn'?'var(--yellow)':'var(--green)';t.className='show';setTimeout(()=>t.className='',3500);}
function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderMd(raw){
  let s=esc(raw);
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  s=s.replace(/`([^`\n]+)`/g,'<code>$1</code>');s=s.replace(/### (.+)/g,'<h3>$1</h3>');
  s=s.replace(/## (.+)/g,'<h2>$1</h2>');s=s.replace(/# (.+)/g,'<h1>$1</h1>');
  s=s.replace(/\n\n+/g,'</p><p>');s=s.replace(/\n/g,'<br>');return '<p>'+s+'</p>';
}
