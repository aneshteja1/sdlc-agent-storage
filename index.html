<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SDLC AI Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
/* ═══════════════ CSS VARIABLES ═══════════════ */
:root { --tr:.22s cubic-bezier(.4,0,.2,1); }
[data-theme="dark"] {
  --bg:#0d1117; --surface:#161c2b; --s2:#1e2740; --s3:#263050;
  --border:#2d3a55; --border2:#3a4a68; --accent:#4f91f5; 
  --green:#34d878; --red:#f85149; --text:#c9d8f0; --text2:#7a90b5;
  --muted:#4a5a78; --nav:#111827;
}
[data-theme="light"] {
  --bg:#f7f5f0; --surface:#ffffff; --s2:#f0ece4; --s3:#e8e2d8;
  --border:#d6d0c4; --border2:#c4bcae; --accent:#2563eb; 
  --green:#16a34a; --red:#dc2626; --text:#1a2236; --text2:#4a5a78;
  --muted:#8a9ab8; --nav:#ffffff;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ═══════════════ COMPONENTS ═══════════════ */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;background:var(--nav);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--red);transition: background 0.3s;}
.logo-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}

.layout{display:grid;grid-template-columns:260px 1fr;flex:1;overflow:hidden;}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-body{flex:1;overflow-y:auto;padding:10px;}

.h-item{padding:12px;border-radius:8px;cursor:pointer;margin-bottom:5px;transition:0.2s;border:1px solid transparent;}
.h-item:hover{background:var(--s2);}
.h-item.active{background:var(--s2);border-color:var(--accent);}
.h-q{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.h-meta{font-size:10px;color:var(--muted);margin-top:4px;}

.chat{display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
.messages{flex:1;overflow-y:auto;padding:30px;display:flex;flex-direction:column;gap:20px;}
.msg{display:flex;gap:15px;max-width:85%;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.agent{align-self:flex-start;}

.bubble{padding:14px 18px;border-radius:15px;line-height:1.6;font-size:14.5px;}
.msg.user .bubble{background:var(--accent);color:#fff;}
.msg.agent .bubble{background:var(--surface);border:1px solid var(--border);}

.input-area{padding:20px;background:var(--surface);border-top:1px solid var(--border);}
.input-box{display:flex;gap:12px;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px;}
#user-input{flex:1;background:none;border:none;outline:none;color:var(--text);resize:none;font-size:14px;padding:5px;}
.send-btn{background:var(--accent);border:none;color:#fff;width:40px;height:40px;border-radius:8px;cursor:pointer;}

.new-btn{margin:10px;padding:12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;}
#reconnect-banner{background:var(--red);color:#fff;font-size:11px;text-align:center;padding:4px;display:none;}
</style>
</head>
<body>

<div id="reconnect-banner">⚠️ Connection Lost. Retrying...</div>

<nav class="nav">
  <div class="logo">
    <div class="logo-dot" id="conn-dot"></div>
    <div class="logo-name">SDLC <em>Agent</em></div>
  </div>
  <div class="nav-r">
    <span id="session-timer" style="font-family:monospace;margin-right:15px;">00:00</span>
    <button class="btn-primary" onclick="toggleTheme()" style="background:none; border:1px solid var(--border); color:var(--text); padding:5px 10px; cursor:pointer; border-radius:5px;">🌓 Theme</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <button class="new-btn" onclick="newSession()">＋ New Session</button>
    <div class="sidebar-body" id="history-list"></div>
  </aside>

  <section class="chat">
    <div class="messages" id="messages">
        <div style="margin:auto; text-align:center; opacity:0.5;" id="welcome-msg">
            <h1>How can I help you build today?</h1>
        </div>
    </div>
    <div class="input-area">
      <div class="input-box">
        <textarea id="user-input" rows="1" placeholder="Type your message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </section>
</div>

<script>
// 1. CONFIGURATION
const BACKEND_URL = 'wss://mrbody-sdlc-agent-backend.hf.space/ws';
let sessionId = Math.random().toString(36).substring(7);
let ws = null;
let chatLog = [];
let isProcessing = false;

// 2. INITIALIZATION
window.onload = () => {
    loadHistory();
    connect();
    setInterval(updateTimer, 1000);
};

function connect() {
    if (ws) ws.close();
    ws = new WebSocket(`${BACKEND_URL}/${sessionId}`);
    
    ws.onopen = () => {
        document.getElementById('conn-dot').style.background = 'var(--green)';
        document.getElementById('reconnect-banner').style.display = 'none';
    };
    
    ws.onclose = () => {
        document.getElementById('conn-dot').style.background = 'var(--red)';
        document.getElementById('reconnect-banner').style.display = 'block';
        setTimeout(connect, 3000);
    };

    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        handleIncoming(msg);
    };
}

// 3. CORE CHAT LOGIC
function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || isProcessing) return;

    // Remove welcome
    const welcome = document.getElementById('welcome-msg');
    if(welcome) welcome.remove();

    // UI Update
    addBubble('user', text);
    chatLog.push({ role: 'user', content: text });
    
    input.value = '';
    isProcessing = true;
    document.getElementById('send-btn').textContent = '⏳';

    ws.send(JSON.stringify({
        content: text,
        session_id: sessionId
    }));
}

function handleIncoming(msg) {
    if (msg.type === 'answer_part') {
        updateAgentBubble(msg.content);
    } else if (msg.type === 'complete') {
        isProcessing = false;
        document.getElementById('send-btn').textContent = '➤';
        saveToLocalStorage();
        loadHistory();
    }
}

// 4. UI HELPERS
function addBubble(role, text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="bubble">${role === 'agent' ? parseMarkdown(text) : text}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
}

let currentAgentDiv = null;
function updateAgentBubble(text) {
    if (!currentAgentDiv || !isProcessing) {
        currentAgentDiv = addBubble('agent', '');
    }
    const bubble = currentAgentDiv.querySelector('.bubble');
    // Simple append for streaming
    bubble.innerHTML += text.replace(/\n/g, '<br>');
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function parseMarkdown(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.*?)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
}

// 5. SESSION MANAGEMENT
function newSession() {
    sessionId = Math.random().toString(36).substring(7);
    chatLog = [];
    document.getElementById('messages').innerHTML = '';
    addBubble('agent', 'New session started. How can I help?');
    connect();
    loadHistory();
}

function loadSession(sid) {
    const saved = JSON.parse(localStorage.getItem(`chat_${sid}`));
    if (!saved) return;
    
    sessionId = sid;
    chatLog = saved;
    document.getElementById('messages').innerHTML = '';
    chatLog.forEach(m => addBubble(m.role, m.content));
    connect();
    loadHistory();
}

function saveToLocalStorage() {
    localStorage.setItem(`chat_${sessionId}`, JSON.stringify(chatLog));
    let sessions = JSON.parse(localStorage.getItem('sessions') || '[]');
    if (!sessions.includes(sessionId)) {
        sessions.push(sessionId);
        localStorage.setItem('sessions', JSON.stringify(sessions));
    }
}

function loadHistory() {
    const list = document.getElementById('history-list');
    const sessions = JSON.parse(localStorage.getItem('sessions') || '[]');
    list.innerHTML = sessions.reverse().map(id => {
        const active = id === sessionId ? 'active' : '';
        return `<div class="h-item ${active}" onclick="loadSession('${id}')">
            <div class="h-q">Session ${id}</div>
            <div class="h-meta">Click to resume</div>
        </div>`;
    }).join('');
}

// 6. UTILS
let startTime = Date.now();
function updateTimer() {
    const sec = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    document.getElementById('session-timer').textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}

function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
}

function toggleSidebar() {
    const layout = document.getElementById('layout');
    layout.style.gridTemplateColumns = layout.style.gridTemplateColumns === '0px 1fr' ? '260px 1fr' : '0px 1fr';
}
</script>
</body>
</html>
